services:
  - type: web
    name: fridge-app-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fridge-db
          property: connectionString
      - key: GEMINI_KEY_SCAN
        sync: false
      - key: GEMINI_KEY_RECIPE
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: fridge-db
    databaseName: fridgedb
    user: fridgeuser
    plan: free
